<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Banner</title>

    <style>
        /* Internal CSS */

        #welcomeBanner {
            background-color: blue;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
        }

        .highlight {
            background-color: yellow;
            font-weight: bold;
            padding: 3px;
        }
    </style>

</head>

<body>

    <div id="welcomeBanner">
        <h1>Welcome, Resident!</h1>

        <p>
            Register for exciting community events and enjoy
            <span style="color:red; font-weight:bold;">
                20% OFF on premium events!
            </span>
        </p>
    </div>

    <br>

    <p class="highlight">
        Hurry! Limited seats available.
    </p>

    <p>
        Our portal provides
        <span class="highlight">easy registration</span>
        and instant updates.
    </p>

</body>

</html>
